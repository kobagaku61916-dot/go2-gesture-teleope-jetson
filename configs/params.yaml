# gesture_node / safety_gate / go2_bridge の設定（設計フェーズの骨格）
# 実測が必要な値は Phase 1-2 で埋める（TODO コメント参照）

gesture_node:
  camera:
    type: v4l2
    device: 4         # 実測済み(2026-07-08): D435i RGB=YUYV は /dev/video4（USB3 接続・30fps）
    width: 640
    height: 480
    fourcc: ""
  pose:
    model_complexity: 1        # 実測(2026-07-08): 0/1 とも 12.9fps で同速 → 精度優先で 1
    detection_confidence: 0.5
    tracking_confidence: 0.5
    min_visibility: 0.3        # 主要ランドマークの visibility 下限（未満は NO BODY 扱い）
                               # Phase 4 実測(2026-07-08): 0.5 だと腕上げ時に手首 visibility が
                               # 下回り FORWARD⇄NO BODY のちらつき → debounce リセットで指令が出ない
  rate: 30.0                   # publish ループ上限 [Hz]（実効はカメラ/推論 fps に律速）
  display: false               # Jetson はヘッドレス既定
  mirror_turns: true           # 対面操作ミラー(2026-07-08 追加): ユーザーが手を出した側と
                               # 同じ方向へ回る（搭載カメラでロボットと向かい合う構成用）
  # --- 速度（safety_gate で 0.6/0.8 にクランプされる）---
  # 2026-07-08: 実機で低速→最高速の段階検証を完走したため、既定を最高速に変更。
  # 初めて動かす構成・環境では起動引数 --low-speed（0.2/0.3 強制）で検証してから。
  low_speed_mode: false
  linear_speed: 0.6            # クランプ上限 = 実効最高速
  angular_speed: 0.8
  # --- ジェスチャー判定（旧リポ実績値・肩幅正規化）---
  raise_margin: 0.5
  raise_near: 1.2
  level_margin: 0.6
  extend_margin: 1.0
  debounce_frames: 3           # 新規: N フレーム連続一致で非ゼロ指令を確定
  # --- ダンス（交互腕伸ばし。旧リポ 2026-07-06 実証値）---
  action:
    enable: false              # 危険動作はデフォルト無効
    dance: dance1
    greet: hello               # 手振りで送るアクション（Greet = Hello お手, api 1016）
  wave:                        # 右手振り検出(2026-07-08。両手かざし方式から変更)
    min_amplitude: 0.18        # 方向転換とみなす片振れ幅 [肩幅]（実機調整: 0.25→0.18）
    min_swings: 4              # 発火に必要な左右方向転換の回数
    min_duration_sec: 2.0      # 振りの継続秒数
    max_gap_sec: 1.2           # 方向転換の間隔がこれを超えたら振り終了（実機調整: 0.8→1.2。13fps で折り返しを取り逃しても継続）
    cooldown_sec: 10.0         # 発火後の不応期 [s]
  # --- 人追従モード（起動引数 --follow で有効。テレオペ/アクションと排他）---
  # 距離は肩幅ベース推定（深度不使用）。target_sw は「追従距離に立った人の正規化肩幅」。
  # 0.19 は D435i HFOV≈69°・肩幅 0.4m・距離 1.5m の幾何推定 → Phase A で実測校正すること。
  follow:
    target_sw: 0.19            # 追従目標距離 1.5m 相当（要実測校正: follow ログの sw= を読む）
    sw_deadband: 0.10          # 目標 ±10% は前後停止
    center_deadband: 0.05      # 画面中心 ±5% は旋回停止
    k_dist: 4.0                # 前後 P ゲイン
    k_yaw: 2.0                 # 旋回 P ゲイン
    max_vx: 0.3                # 前進上限（初期は保守的に。慣れたら 0.5 まで）
    max_back_vx: 0.2           # 後退上限（近すぎ時）
    max_omega: 0.6             # 旋回上限
    smooth_alpha: 0.4          # 出力ローパス（小さいほど滑らか・応答遅）
  dance:
    extend_ratio: 1.0
    retract_ratio: 0.6
    min_duration_sec: 5.0
    min_swaps: 4
    max_interval_sec: 3.0       # Phase 3 実測(2026-07-08): 13fps 環境では 2.0 だとスワップ 1 回で途切れる
    cooldown_sec: 15.0
    no_body_grace_sec: 0.7     # Phase 4 実測(2026-07-08): 欠損 1 フレームで 50% のチェーンが消えたため追加

safety_gate:
  max_linear: 0.6              # クランプ上限（変更しない）
  max_angular: 0.8
  watchdog_timeout_sec: 0.5
  action_allowlist: [dance1, dance2, hello, stop_move, balance_stand]
  action_cooldown_sec: 15.0
  action_stop_hold_sec: 1.0    # /cmd_vel がこの秒数ゼロでなければアクション拒否
  action_bypass: [stop_move, balance_stand]   # 緊急系はゲート即通し

go2_bridge:
  # 抽象アクション名 → api_id（Jetson 上の SDK 2 ソースで実測確認済み 2026-07-06）
  # 危険動作（FrontFlip 等）は載せないこと
  action_api_ids:
    dance1: 1022
    dance2: 1023
    hello: 1016
    stop_move: 1003
    balance_stand: 1002
  move_api_id: 1008
